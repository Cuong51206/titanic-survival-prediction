<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Titanic Survival Prediction</title>
    <style>
        body { background-color: #f4f6f9; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; }
        .container { width: 450px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0px 4px 15px rgba(0,0,0,0.1); }
        select, input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box;}
        button { width: 100%; padding: 12px; background-color: #28a745; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 15px;}
        button:hover { background-color: #218838; }
        h2 { color: #dc3545; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Titanic Survival Prediction 🚢</h1>
        <form action="{{ url_for('predict') }}" method="post">
            <select name="Pclass" required>
                <option value="" disabled selected>Chọn hạng vé (Pclass)</option>
                <option value="1">Hạng 1 (Thương gia)</option>
                <option value="2">Hạng 2 (Phổ thông đặc biệt)</option>
                <option value="3">Hạng 3 (Phổ thông)</option>
            </select>

            <select name="Sex" required>
                <option value="" disabled selected>Chọn giới tính (Sex)</option>
                <option value="1">Nam (Male)</option>
                <option value="0">Nữ (Female)</option>
            </select>

            <input type="number" step="0.1" name="Age" placeholder="Nhập tuổi (Age)" required="required" />
            <input type="number" name="SibSp" placeholder="Số anh/chị/em/vợ/chồng đi cùng (SibSp)" required="required" />
            <input type="number" name="Parch" placeholder="Số cha mẹ/con cái đi cùng (Parch)" required="required" />
            <input type="number" step="0.01" name="Fare" placeholder="Giá vé đã mua (Fare - USD)" required="required" />

            <select name="Embarked" required>
                <option value="" disabled selected>Cảng lên tàu (Embarked)</option>
                <option value="0">Cảng Southampton (S)</option>
                <option value="1">Cảng Cherbourg (C)</option>
                <option value="2">Cảng Queenstown (Q)</option>
            </select>

            <select name="Title" required>
                <option value="" disabled selected>Danh xưng (Title)</option>
                <option value="1">Ông (Mr)</option>
                <option value="2">Cô (Miss)</option>
                <option value="3">Bà (Mrs)</option>
                <option value="4">Bé trai (Master)</option>
                <option value="5">Khác (Tiến sĩ, Đại tá...)</option>
            </select>

            <button type="submit">Dự đoán tỷ lệ sống sót</button>
        </form>

        <h2>{{ prediction_text }}</h2>
    </div>
</body>
</html>
